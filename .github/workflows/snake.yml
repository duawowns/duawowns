name: Generate Snake Animation

on:
  schedule:
    # 매일 자정에 실행 (UTC 기준)
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v5

      # Snake 애니메이션 생성
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            public/github-contribution-grid-snake.svg
            public/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 생성된 SVG를 main 브랜치에 반영
      - name: Commit generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/github-contribution-grid-snake.svg public/github-contribution-grid-snake-dark.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update snake animation"
          git push
